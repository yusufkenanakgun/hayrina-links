<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hayrına</title>
  <meta property="og:title" content="Hayrına" />
  <meta property="og:description" content="Hayrına - yardım ve bağış platformu" />
  <meta property="og:type" content="website" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #30D5C8; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 24px; box-sizing: border-box; }
    .card { background: rgba(255,255,255,0.12); padding: 32px; border-radius: 16px; max-width: 420px; width: 100%; backdrop-filter: blur(10px); }
    h1 { margin: 0 0 12px; font-size: 28px; font-weight: 700; }
    p { margin: 0 0 24px; opacity: 0.95; line-height: 1.5; font-size: 16px; }
    .stores { display: none; }
    a.btn { display: inline-block; background: #fff; color: #30D5C8; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; margin: 6px; min-width: 140px; }
    a.btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hayrına</h1>
    <p id="msg">Uygulamayı açıyoruz...</p>
    <div id="stores" class="stores">
      <a class="btn" id="ios" href="#">App Store</a>
      <a class="btn" id="android" href="#">Google Play</a>
    </div>
  </div>
  <script>
    (function () {
      // Yayın sonrası gerçek değerlerle değiştir:
      var IOS_STORE = 'https://apps.apple.com/tr/app/hayrina/idAPP_STORE_ID';
      var ANDROID_STORE = 'https://play.google.com/store/apps/details?id=com.hayrina.app';

      var path = window.location.pathname || '/';
      var search = window.location.search || '';
      var ua = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);

      var stores = document.getElementById('stores');
      var msg = document.getElementById('msg');
      document.getElementById('ios').href = IOS_STORE;
      document.getElementById('android').href = ANDROID_STORE;

      function showStores(text) {
        msg.textContent = text;
        stores.style.display = 'block';
      }

      if (!isIOS && !isAndroid) {
        showStores('Hayrına mobil uygulamasını telefonunuzdan açın.');
        return;
      }

      // Universal link zaten yüklüyse intercept etmiş olur, bu sayfa hiç görünmez.
      // Burası: app yüklü değil + /listing/xxx açıldı durumu.
      var deepPath = path.replace(/^\/+/, '');
      var scheme = 'hayrina://' + deepPath + search;

      var fallbackTimer = setTimeout(function () {
        showStores('Uygulama yüklü değil. Mağazadan indirebilirsiniz:');
        window.location.href = isIOS ? IOS_STORE : ANDROID_STORE;
      }, 1500);

      // Sayfa background'a giderse (uygulama açıldı), fallback'i iptal et
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) clearTimeout(fallbackTimer);
      });

      // Custom scheme tetikle
      window.location.href = scheme;
    })();
  </script>
</body>
</html>
